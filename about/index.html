  const cards = document.querySelectorAll('.interest-card');
  
  cards.forEach(card => {
    card.addEventListener('mousemove', function(e) {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      
      // 【修正 1】降低灵敏度：除数从 20 改为 60，动效更微小细腻
      let rotateY = x / 60; 
      let rotateX = -y / 60;
      
      // 【修正 2】角度限制：限制在 ±8 度以内，防止太歪
      rotateY = Math.max(-8, Math.min(8, rotateY));
      rotateX = Math.max(-8, Math.min(8, rotateX));
      
      // 保持上浮 -16px
      card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02) translateY(-16px)`;
    });
    
    card.addEventListener('mouseleave', function() {
      // 复原
      card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1) translateY(0)';
    });
  });
});</script></body></html></main><footer class="footer"><div class="footer-bottom"><div class="footer-copyright">presented by Zimin "shinhong" Liu</div><!-- Footer centered image with link--><div class="footer-image" style="text-align: center; margin: 15px 0;"><a href="https://bgm.tv/user/shinhong" target="_blank" rel="noopener noreferrer"><img src="/images/4.jpg" alt="Footer Image" style="max-width: 100%; height: auto;"/></a></div></div></footer></div><!-- 立即应用暗色模式，避免页面闪烁--><script>(function() {
